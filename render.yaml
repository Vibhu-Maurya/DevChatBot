services:
  - type: web
    name: devchatbot-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd search_service && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: QDRANT_PATH
        value: "/tmp/qdrant_db"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DEFAULT_LLM_PROVIDER
        value: "gemini"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
